name: Deploy

on:
  push:
    branches:
      - main_docker

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login \
          --username AWS \
          --password-stdin 289669703784.dkr.ecr.us-east-1.amazonaws.com

      - name: Build image
        run: docker build -t resthub-api .

      - name: Tag image
        run: docker tag resthub-api:latest 289669703784.dkr.ecr.us-east-1.amazonaws.com/resthub/api:latest

      - name: Push image
        run: docker push 289669703784.dkr.ecr.us-east-1.amazonaws.com/resthub/api:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_DOCKER }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST_DOCKER }} "
            set -e
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_DEFAULT_REGION=us-east-1
            
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 289669703784.dkr.ecr.us-east-1.amazonaws.com
            
            docker pull 289669703784.dkr.ecr.us-east-1.amazonaws.com/resthub/api:latest
            
            docker stop resthub-api || true
            docker rm resthub-api || true
            
            docker run -d \
              --env-file /home/ec2-user/resthub.env \
              -p 80:3001 \
              --name resthub-api \
              289669703784.dkr.ecr.us-east-1.amazonaws.com/resthub/api:latest
